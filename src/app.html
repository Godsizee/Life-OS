<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
		/>
		<meta name="text-scale" content="scale" />

		<!-- Standalone-/App-Verhalten für installierte PWA (u. a. Galaxy Z Fold Cover-Display) -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Life OS" />
		<meta id="theme-color-meta" name="theme-color" content="#F6F6F8" />

		<script>
			(function () {
				const stored = localStorage.getItem('theme');
				const dark =
					stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches);
				if (dark) {
					document.documentElement.classList.add('dark');
				} else {
					document.documentElement.classList.remove('dark');
				}
				// Status-Bar-Farbe passend zum Theme setzen, damit die installierte App
				// nahtlos wirkt (kein weißer Balken im Dark Mode).
				var meta = document.getElementById('theme-color-meta');
				if (meta) meta.setAttribute('content', dark ? '#0E0E12' : '#F6F6F8');
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-[var(--surface-1)] text-[var(--text-primary)] antialiased transition-colors duration-300">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
